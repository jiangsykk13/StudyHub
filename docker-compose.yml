services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studyhub_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-studyhub}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/20-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-studyhub_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-studyhub_minio_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local ${S3_ENDPOINT:-http://minio:9000} ${S3_ACCESS_KEY_ID:-studyhub_minio} ${S3_SECRET_ACCESS_KEY:-studyhub_minio_dev_password};
      mc mb --ignore-existing local/${S3_BUCKET:-studyhub-private};
      mc anonymous set none local/${S3_BUCKET:-studyhub-private};
      mc version enable local/${S3_BUCKET:-studyhub-private};
      "

volumes:
  postgres-data:
  minio-data:
