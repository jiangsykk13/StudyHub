name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: studyhub
          POSTGRES_PASSWORD: studyhub_dev_password
          POSTGRES_DB: studyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U studyhub -d studyhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://studyhub:studyhub_dev_password@localhost:5432/studyhub?schema=public
      TEST_DATABASE_URL: postgresql://studyhub:studyhub_dev_password@localhost:5432/studyhub_test?schema=public
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: studyhub_minio
      S3_SECRET_ACCESS_KEY: studyhub_minio_dev_password
      S3_BUCKET: studyhub-private
      S3_FORCE_PATH_STYLE: "true"
      COOKIE_SECRET: ci-cookie-secret-please-replace-in-production-123
      CSRF_SECRET: ci-csrf-secret-please-replace-in-production-123
      PNPM_CONFIG_OPTIONAL: "true"
      WEB_ORIGIN: http://localhost:3000
      TRUSTED_ORIGINS: http://localhost:3000,http://localhost:4000
      API_INTERNAL_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: |
          pnpm config get optional
          pnpm install --frozen-lockfile
      - name: Verify native package installs
        run: |
          node -e "require.resolve('@rollup/rollup-linux-x64-gnu')"
          node -e "require.resolve('@turbo/linux-64')"
      - name: Prepare PostgreSQL databases
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql "postgresql://studyhub:studyhub_dev_password@localhost:5432/studyhub" -v ON_ERROR_STOP=1 -c "CREATE DATABASE studyhub_test;" || true
      - name: Start MinIO
        run: |
          docker run -d --name studyhub-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER="$S3_ACCESS_KEY_ID" \
            -e MINIO_ROOT_PASSWORD="$S3_SECRET_ACCESS_KEY" \
            minio/minio:RELEASE.2025-06-13T11-33-47Z server /data --console-address ":9001"

          for i in {1..30}; do
            if curl -fsS "$S3_ENDPOINT/minio/health/ready" >/dev/null; then
              exit 0
            fi

            docker logs --tail 20 studyhub-minio || true
            sleep 2
          done

          docker logs studyhub-minio
          exit 1
      - name: Prepare private MinIO bucket
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set local "$S3_ENDPOINT" "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"
          /tmp/mc mb --ignore-existing "local/$S3_BUCKET"
          /tmp/mc anonymous set none "local/$S3_BUCKET"
      - run: pnpm db:generate
      - name: Apply migrations
        run: |
          pnpm db:migrate
          DATABASE_URL="$TEST_DATABASE_URL" pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm verify
      - run: pnpm test:e2e
